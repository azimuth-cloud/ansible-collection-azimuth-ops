---
# The namespace to create alertmanager configs in
alertmanager_config_namespace: >-
  {{ kube_prometheus_stack_release_namespace | default('monitoring-system') }}

# The labels to apply to alertmanager configs so they are picked up by the alert manager
_kube_prometheus_stack_release_name: >-
  {{ kube_prometheus_stack_release_name | default("kube-prometheus-stack") }}
alertmanager_config_labels:
  app.kubernetes.io/managed-by: azimuth-ops
  alertmanager: "{{ _kube_prometheus_stack_release_name }}-alertmanager"

# Configure Slack webhooks and channels to send alerts to, see monitoring documentation in azimuth-config
# The Slack URL to use for the alertmanager Slack webhook to send alerts by default
alertmanager_config_slack_webhook_url:
# The Slack URL to use for the alertmanager Slack webhook to send only critical alerts
alertmanager_config_slack_critical_webhook_url:
# The Slack URL to use for the alertmanager Slack webhook to send only warning alerts
alertmanager_config_slack_warning_webhook_url:
# The name of the channel to send alerts to
# If not given, the default channel for the webhook will be used
alertmanager_config_slack_webhook_channel:
alertmanager_config_slack_critical_webhook_channel:
alertmanager_config_slack_warning_webhook_channel:
# The name and key of the secret containing the Slack webhook URL
alertmanager_config_slack_webhook_secret_name: alertmanager-slack-webhook
# checkov:skip=CKV_SECRET_6: No secret in config
alertmanager_config_slack_webhook_secret_key: slack-api-url
# Map of webhooks for the configured Slack routing
alertmanager_config_slack_webhook_secret_map: >-
  {{-
    {} | combine(
        { alertmanager_config_slack_webhook_secret_key: alertmanager_config_slack_webhook_url }
        if alertmanager_config_slack_webhook_url is defined else {}
      ) | combine(
        { alertmanager_config_slack_webhook_secret_key+"-critical": alertmanager_config_slack_critical_webhook_url }
        if alertmanager_config_slack_critical_webhook_url is defined else {}
      ) | combine(
        { alertmanager_config_slack_webhook_secret_key+"-warning": alertmanager_config_slack_warning_webhook_url }
        if alertmanager_config_slack_warning_webhook_url is defined else {}
      )
  }}

# The name of the alertmanager config for the Slack webhook
alertmanager_config_slack_name: alertmanager-slack-webhook

# Templates for the Slack receiver
alertmanager_config_slack_receiver_template_color: >-
  {%- raw -%}
  {{- if eq .Status "firing" -}}
    {{- if eq .GroupLabels.severity "warning" -}}
      warning
    {{- else if eq .GroupLabels.severity "critical" -}}
      danger
    {{- else -}}
      #439FE0
    {{- end -}}
  {{- else -}}
    good
  {{- end -}}
  {%- endraw -%}
alertmanager_config_slack_receiver_template_title: >-
  {%- raw -%}
  {{- if eq .Status "firing" -}}
    [{{ .GroupLabels.severity | toUpper }}:{{ .Alerts.Firing | len }}]
  {{- else -}}
    [{{ .Status | toUpper }}]
  {{- end }}
  {{ .GroupLabels.alertname }}
  {%- endraw -%}
alertmanager_config_slack_receiver_template_text: |-
  {%- raw -%}
  {{- if eq .Status "firing" }}
  {{- with .CommonAnnotations.summary }}
  *Summary:* {{ . }}
  {{- end }}
  {{- end }}
  {{- with .GroupLabels.namespace }}
  *Namespace:* {{ . }}
  {{- end }}
  {{- if (index .Alerts 0).Labels.pod }}
  *Affected pods*:
  {{- if eq .Status "firing" }}
  {{- range .Alerts.Firing }}
    - {{ .Labels.pod }}
  {{- end }}
  {{- else }}
  {{- range .Alerts }}
    - {{ .Labels.pod }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- if eq .Status "firing" }}
  {{- range .Alerts.Firing }}
  {{- if .Annotations.description }}
  {{- "\n" }}
  {{ .Annotations.description }}
  {{- else if .Annotations.message }}
  {{- "\n" }}
  {{ .Annotations.message }}
  {{- end }}
  {{- end }}
  {{- with .CommonAnnotations.runbook_url }}
  {{- "\n" }}
  *Runbook URL:* {{ . }}
  {{- end }}
  {{- end }}
  {%- endraw -%}

# The Slack receiver default config without webhook config
alertmanager_config_slack_receiver_defaults: >-
  {{-
    {
      "apiURL": {
        "name": alertmanager_config_slack_webhook_secret_name,
        "key":  alertmanager_config_slack_webhook_secret_key,
      },
      "color": alertmanager_config_slack_receiver_template_color,
      "title": alertmanager_config_slack_receiver_template_title,
      "text": alertmanager_config_slack_receiver_template_text,
      "sendResolved": True,
    }
  }}

# If the critical webhook is defined overwrite the webhook URL
alertmanager_config_slack_critical_receiver_config: >-
  {{-
    alertmanager_config_slack_receiver_defaults |
      combine(
        {
          "apiURL": {
            "key":  alertmanager_config_slack_webhook_secret_key+"-critical",
          }
        } if alertmanager_config_slack_critical_webhook_url is defined
        else {},
        recursive = True
      )
  }}

# If the warning webhook is defined overwrite the webhook URL
alertmanager_config_slack_warning_receiver_config: >-
  {{-
    alertmanager_config_slack_receiver_defaults |
      combine(
        {
          "apiURL": {
            "key":  alertmanager_config_slack_webhook_secret_key+"-warning",
          }
        } if alertmanager_config_slack_warning_webhook_url is defined
        else {},
        recursive = True
      )
  }}

alertmanager_config_slack_receiver_overrides: {}
alertmanager_config_slack_receiver: >-
  {{-
    alertmanager_config_slack_receiver_defaults |
      combine(
        { "channel": alertmanager_config_slack_webhook_channel }
        if alertmanager_config_slack_webhook_channel
        else {}
      ) |
      combine(alertmanager_config_slack_receiver_overrides, recursive = True)
  }}

alertmanager_config_slack_critical_receiver: >-
  {{-
    alertmanager_config_slack_critical_receiver_config |
      combine(
        { "channel": alertmanager_config_slack_webhook_channel }
        if alertmanager_config_slack_critical_webhook_channel is defined
        else {},
        recursive = True
      ) |
      combine(alertmanager_config_slack_receiver_overrides, recursive = True)
  }}

alertmanager_config_slack_warning_receiver: >-
  {{-
    alertmanager_config_slack_warning_receiver_config |
      combine(
        { "channel": alertmanager_config_slack_webhook_channel }
        if alertmanager_config_slack_warning_webhook_channel is defined
        else {},
        recursive = True
      ) |
      combine(alertmanager_config_slack_receiver_overrides, recursive = True)
  }}

# The spec of the alertmanager config for the Slack webhook
# Always split the alerts but reuse the same receiver if we only have one slack channel
alertmanager_config_slack_spec_defaults:
  route:
    receiver: critical-slack-notifications
    groupBy:
      - namespace
      - severity
      - alertname
    matchers:
      - name: alertname
        matchType: "!~"
        value: InfoInhibitor|Watchdog
      - name: severity
        matchType: "=~"
        value: warning|critical
    routes:
      - receiver: critical-slack-notifications
        matchers:
          - name: severity
            matchType: "="
            value: critical
      - receiver: warning-slack-notifications
        matchers:
          - name: severity
            matchType: "="
            value: warning
  receivers:
    - name: warning-slack-notifications
      slackConfigs:
        - "{{ alertmanager_config_slack_warning_receiver | default(alertmanager_config_slack_receiver) }}"
    - name: critical-slack-notifications
      slackConfigs:
        - "{{ alertmanager_config_slack_critical_receiver | default(alertmanager_config_slack_receiver) }}"
alertmanager_config_slack_spec_overrides: {}
alertmanager_config_slack_spec: >-
  {{-
    alertmanager_config_slack_spec_defaults |
      combine(alertmanager_config_slack_spec_overrides, recursive = True)
  }}
