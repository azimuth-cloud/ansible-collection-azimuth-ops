apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: helm-dashboard
  namespace: monitoring-system
  labels:
    app.kubernetes.io/managed-by: azimuth-ops
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: ingress-traefik
  hostnames:
    - "helm.apps.{{ ingress_base_domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 600s
        backendRequest: 600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: admin-dashboard-auth
      backendRefs:
        - name: helm-dashboard
          port: 8080   # ← à vérifier
