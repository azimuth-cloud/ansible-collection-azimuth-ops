apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: keycloak-transport
  namespace: keycloak-system
spec:
  forwardingTimeouts:
    dialTimeout: 600s
    responseHeaderTimeout: 600s
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak-system
  labels:
    app.kubernetes.io/managed-by: azimuth-ops
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: ingress-traefik
  hostnames:
    - "identity.{{ ingress_base_domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 600s
        backendRequest: 600s
      backendRefs:
        - name: keycloak-service
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-traefik-keycloak
  namespace: keycloak-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: keycloak-system
  to:
    - group: ""
      kind: Service