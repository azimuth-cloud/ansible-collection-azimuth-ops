---
- name: Create namespace for admin dashboard ingress
  ansible.builtin.command: kubectl create namespace {{ item }}
  register: admin_dashboard_ingress_create_namespace
  changed_when: admin_dashboard_ingress_create_namespace.rc == 0
  failed_when: >-
    admin_dashboard_ingress_create_namespace.rc != 0 and
    'AlreadyExists' not in admin_dashboard_ingress_create_namespace.stderr
  loop: "{{ admin_dashboard_ingress_namespaces }}"

- name: Generate SHA-512 hash via openssl
  ansible.builtin.command:
    cmd: openssl passwd -6 "{{ admin_dashboard_ingress_basic_auth_password }}"
  delegate_to: localhost
  register: admin_dashboard_ingress_basic_auth_password_hash
  changed_when: false

- name: Install basic auth secret for admin dashboard ingress
  ansible.builtin.command: kubectl apply -f -
  args:
    stdin: "{{ admin_dashboard_ingress_basic_auth_secret_definition | to_nice_yaml }}"
  vars:
    admin_dashboard_ingress_basic_auth_secret_definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ admin_dashboard_ingress_basic_auth_secret_name }}"
        namespace: "{{ item }}"
      type: Opaque
      stringData:
        users: |
          {{ admin_dashboard_ingress_basic_auth_username }}:{{ admin_dashboard_ingress_basic_auth_password_hash.stdout }}
  loop: "{{ admin_dashboard_ingress_namespaces }}"
  register: admin_dashboard_ingress_admin_dashboard_ingress_kubectl_basic_auth_secret
  changed_when: admin_dashboard_ingress_admin_dashboard_ingress_kubectl_basic_auth_secret.stdout_lines | select('match', '(?!.*unchanged$)') | length > 0

# If there is a wildcard certificate, install it once per namespace
- name: Create TLS secret for dashboard
  ansible.builtin.command: kubectl apply -f -
  args:
    stdin: "{{ admin_dashboard_ingress_tls_wildcard_secret_definition | to_nice_yaml }}"
  vars:
    admin_dashboard_ingress_tls_wildcard_secret_definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ admin_dashboard_ingress_tls_wildcard_secret_name }}"
        namespace: "{{ item }}"
      type: kubernetes.io/tls
      stringData:
        tls.crt: "{{ admin_dashboard_ingress_tls_wildcard_certificate }}"
        tls.key: "{{ admin_dashboard_ingress_tls_wildcard_key }}"
  loop: "{{ admin_dashboard_ingress_namespaces }}"
  register: admin_dashboard_ingress_kubectl_basic_auth_secret_dashboard
  changed_when: admin_dashboard_ingress_kubectl_basic_auth_secret_dashboard.stdout_lines | select('match', '(?!.*unchanged$)') | length > 0
  when: >-
    admin_dashboard_ingress_tls_enabled and
    admin_dashboard_ingress_tls_wildcard_certificate

- name: Create Traefik Middleware
  ansible.builtin.command: kubectl apply -f -
  args:
    stdin: "{{ middlewane_definition | to_nice_yaml }}"
  vars:
    middlewane_definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: admin-dashboard-auth
        namespace: azimuth
      spec:
        basicAuth:
          secret: "{{ admin_dashboard_ingress_basic_auth_secret_name }}"
          realm: "Azimuth admin dashboards"
          removeHeader: true
  register: admin_dashboard_ingress_kubectl_middleware
  changed_when: admin_dashboard_ingress_kubectl_middleware.stdout_lines | select('match', '(?!.*unchanged$)') | length > 0

- name: Create HTTPRoute
  ansible.builtin.command: kubectl apply -f -
  args:
    stdin: "{{ httproute_definition | to_nice_yaml }}"
  vars:
    httproute_definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: ara
        namespace: azimuth
        labels:
          app.kubernetes.io/managed-by: azimuth-ops
      spec:
        parentRefs:
          - name: traefik-gateway
            namespace: ingress-traefik
        hostnames:
          - "ara.{{ azimuth_ingress_host }}"
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            timeouts:
              request: 600s
              backendRequest: 600s
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: admin-dashboard-auth   # ← basicAuth
            backendRefs:
              - name: azimuth-caas-operator-ara
                port: 8000
  register: admin_dashboard_ingress_kubectl_httproute
  changed_when: admin_dashboard_ingress_kubectl_httproute.stdout_lines | select('match', '(?!.*unchanged$)') | length > 0
