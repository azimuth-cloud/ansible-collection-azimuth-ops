---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: harbor-transport
  namespace: harbor
spec:
  forwardingTimeouts:
    dialTimeout: 600s
    responseHeaderTimeout: 600s
---
# Redirect HTTP → HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: harbor-https-redirect
  namespace: harbor
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# Body size illimité (proxy-body-size: 0)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: harbor-buffering
  namespace: harbor
spec:
  buffering:
    maxRequestBodyBytes: 0    # 0 = illimité
    maxResponseBodyBytes: 0
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-ingress
  namespace: harbor
  labels:
    app: harbor
    app.kubernetes.io/instance: harbor
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: harbor
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: ingress-traefik
  hostnames:
    - "registry.{{ ingress_base_domain }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      timeouts:
        request: 600s
        backendRequest: 600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: harbor-buffering
      backendRefs:
        - name: harbor-core
          port: 80

    - matches:
        - path:
            type: PathPrefix
            value: /service/
      timeouts:
        request: 600s
        backendRequest: 600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: harbor-buffering
      backendRefs:
        - name: harbor-core
          port: 80

    - matches:
        - path:
            type: PathPrefix
            value: /v2/
      timeouts:
        request: 600s
        backendRequest: 600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: harbor-buffering
      backendRefs:
        - name: harbor-core
          port: 80

    - matches:
        - path:
            type: PathPrefix
            value: /c/
      timeouts:
        request: 600s
        backendRequest: 600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: harbor-buffering
      backendRefs:
        - name: harbor-core
          port: 80

    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 600s
        backendRequest: 600s
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: harbor-buffering
      backendRefs:
        - name: harbor-portal
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-traefik-harbor
  namespace: harbor
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: harbor
  to:
    - group: ""
      kind: Service
